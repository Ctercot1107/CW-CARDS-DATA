    <script>
    var CURRENT_VERSION = "v1.8.1";
    var REPO_OWNER = "Ctercot1107";
    var REPO_NAME = "CW-CARDS-DATA";
    var BRANCH = "main";
    var CDN_BASE = "https://cdn.jsdelivr.net/gh/" + REPO_OWNER + "/" + REPO_NAME + "@" + BRANCH;
    var RAW_BASE = "https://raw.githubusercontent.com/" + REPO_OWNER + "/" + REPO_NAME + "/" + BRANCH;
    var FORCE_CACHE_KEY = "force_update_cache";
    var pendingTargetVersion = null;

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function smartFetch(path) {
        var cdnUrl = CDN_BASE + "/" + path;
        var rawUrl = RAW_BASE + "/" + path;
        return fetch(cdnUrl).then(function(response) {
            if (response.ok) return response.text();
            throw new Error("CDN失败");
        }).catch(function() {
            return fetch(rawUrl).then(function(response) {
                if (response.ok) return response.text();
                throw new Error("全部失败");
            });
        });
    }

    function downloadNewVersion(version) {
        var gameUrl = CDN_BASE + "/" + version + "/game.html?t=" + Date.now();
        fetch(gameUrl).then(function(response) {
            if (!response.ok) throw new Error("HTTP " + response.status);
            return response.blob();
        }).then(function(blob) {
            var url = window.URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = "scp-cards-" + version + ".html";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }).catch(function(err) {
            console.error("下载失败:", err);
        });
    }

    function showUpdateModal(updateInfo, targetVersion, force) {
        var modal = document.getElementById("updateModal");
        var titleEl = document.getElementById("updateModalTitle");
        var dateEl = document.getElementById("updateModalDate");
        var contentEl = document.getElementById("updateModalContent");
        var footer = document.getElementById("updateModalFooter");

        titleEl.innerText = updateInfo.title || "版本更新";
        dateEl.innerText = updateInfo.date || "";
        var contentHtml = "";
        if (updateInfo.content && updateInfo.content.length) {
            for (var i = 0; i < updateInfo.content.length; i++) {
                contentHtml += "<div>• " + escapeHtml(updateInfo.content[i]) + "</div>";
            }
        } else {
            contentHtml = "<div>无详细说明</div>";
        }
        contentEl.innerHTML = contentHtml;
        footer.innerHTML = "";

        var downloadBtn = document.createElement("button");
        downloadBtn.className = "modal-btn primary";
        downloadBtn.innerText = "📥 下载新版本";
        downloadBtn.onclick = function() {
            downloadNewVersion(targetVersion);
        };
        footer.appendChild(downloadBtn);

        var experienceBtn = document.createElement("button");
        experienceBtn.className = "modal-btn";
        experienceBtn.innerText = "✨ 体验新版本";
        experienceBtn.style.background = "#2a7a3a";
        experienceBtn.style.borderColor = "#2a7a3a";
        experienceBtn.style.color = "#fff";
        experienceBtn.onclick = function() {
            var jumpUrl = CDN_BASE + "/" + targetVersion + "/game.html?t=" + Date.now();
            localStorage.removeItem(FORCE_CACHE_KEY);
            window.location.href = jumpUrl;
        };
        footer.appendChild(experienceBtn);

        if (!force) {
            var cancelBtn = document.createElement("button");
            cancelBtn.className = "modal-btn cancel";
            cancelBtn.innerText = "取消";
            cancelBtn.onclick = function() {
                modal.classList.remove("active");
            };
            footer.appendChild(cancelBtn);
        }

        modal.classList.add("active");
        pendingTargetVersion = targetVersion;
    }

    function checkLocalForceCache() {
        var cacheStr = localStorage.getItem(FORCE_CACHE_KEY);
        if (!cacheStr) return false;
        try {
            var cache = JSON.parse(cacheStr);
            if (cache.targetVersion && cache.updateInfo) {
                showUpdateModal(cache.updateInfo, cache.targetVersion, true);
                return true;
            }
        } catch (e) {}
        return false;
    }

    function checkForUpdate() {
        smartFetch(CURRENT_VERSION + "/update-req").then(function(instrText) {
            var instruction = instrText.trim().toLowerCase();
            if (instruction === "no") {
                return;
            }
            if (instruction === "yes" || instruction === "force") {
                var force = (instruction === "force");
                return Promise.all([
                    smartFetch("newest-version"),
                    smartFetch("updateinfo")
                ]).then(function(results) {
                    var newVersion = results[0].trim();
                    var info = JSON.parse(results[1]);
                    if (newVersion === CURRENT_VERSION) return;
                    if (force) {
                        var cacheData = {
                            targetVersion: newVersion,
                            updateInfo: info,
                            timestamp: Date.now()
                        };
                        localStorage.setItem(FORCE_CACHE_KEY, JSON.stringify(cacheData));
                    }
                    showUpdateModal(info, newVersion, force);
                });
            }
        }).catch(function(err) {
            checkLocalForceCache();
        });
    }

    checkForUpdate();

    var mainMenu = document.getElementById("mainMenuScreen");
    var offlineScreen = document.getElementById("offlineScreen");
    var onlineScreen = document.getElementById("onlineScreen");
    var backBtn = document.getElementById("backToMenuBtn");

    function exitToMenu() {
        if (onlineClient && onlineRoomJoined) {
            onlineClient.disconnect();
            onlineRoomJoined = false;

    document.getElementById("refreshRoomsBtn").onclick = function () { if (onlineClient && onlineClient.isInLobby()) onlineClient.getRegions(); };
    document.getElementById("onlineEndTurnBtn").onclick = function () { if (onlineGameState && onlineGameState.turnOwner === onlineMyRole && !onlineGameState.gameOver) { broadcastMySelection(null, null); sendOnlineOp("endTurn", {}); } };
    document.getElementById("onlineDrawCardBtn").onclick = function () { if (onlineGameState && onlineGameState.turnOwner === onlineMyRole && onlineGameState.currentMP >= 1.49) { sendOnlineOp("draw", {}); var units = (onlineMyRole === "host") ? onlineGameState.myUnits : onlineGameState.enemyUnits; var e = -1; for (var i = 0; i < 12; i++) { if (!units[i] || units[i].hp <= 0) { e = i; break; } } if (e !== -1) playDrawAnimation(mySlotElements[e]); } };
    document.getElementById("onlineMoveModeBtn").onclick = function () { if (onlineGameState && !onlineGameState.gameOver && onlineGameState.turnOwner === onlineMyRole) { onlineSelected = null; onlineAction = null; onlineMoving = !onlineMoving; renderOnlineBattle(); onlineLog(onlineMoving ? "交换模式开启" : "关闭"); if (!onlineMoving) broadcastMySelection(null, null); } };
    document.getElementById("onlineSurrenderBtn").onclick = surrender;
    document.getElementById("onlineResetGameBtn").onclick = resetOnlineGame;
    document.getElementById("sendChatBtn").onclick = sendChatMessage;
    document.getElementById("chatInput").addEventListener("keypress", function (e) { if (e.key === "Enter") sendChatMessage(); });
    document.getElementById("onlineUnequipWeaponBtn").onclick = function () { unequipOnline("weapon"); };
    document.getElementById("onlineUnequipArmorBtn").onclick = function () { unequipOnline("armor"); };
    document.getElementById("onlineAttackWeaponBtn").onclick = function () { if (onlineAction === "attack") { onlineAction = "attackWeapon"; onlineLog("🗡️ 打武器"); renderOnlineBattle(); } else if (onlineAction === "attackWeapon") { onlineAction = "attack"; onlineLog("切回本体"); renderOnlineBattle(); } else onlineLog("请先选中单位"); };
    function unequipOnline(t) { if (onlineSelected !== null && onlineGameState && onlineGameState.turnOwner === onlineMyRole && !onlineGameState.gameOver) { sendOnlineOp("unequip", { targetSlot: onlineSelected, type: t }); resetOnlineAction(); } else onlineLog("请先选中单位"); }
    
    </script>
</body>
</html>
